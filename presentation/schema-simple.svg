<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" role="img" aria-label="Schťma simple Smart Home style Wokwi">
  <defs>
    <style>
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #333; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #222; }
      .pin { font-family: Arial, Helvetica, sans-serif; font-size: 10px; fill: #555; }
      .pinw { font-family: Arial, Helvetica, sans-serif; font-size: 10px; fill: #eee; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #666; }
    </style>
  </defs>

  <!-- Canvas -->
  <rect width="1100" height="640" fill="#f8f9fa"/>
  <rect x="16" y="16" width="1068" height="608" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>

  <text x="36" y="48" class="title">Smart Home  Schťma de c‚blage (ESP32)</text>
  <text x="36" y="68" class="tiny">Style simple ∑ fils colorťs ∑ broches GPIO</text>

  <!-- ===== ESP32 BOARD ===== -->
  <g id="esp32">
    <rect x="430" y="160" width="200" height="320" rx="6" fill="#1a1a2e" stroke="#0f0f1a" stroke-width="2"/>
    <!-- USB -->
    <rect x="498" y="148" width="64" height="14" rx="2" fill="#555"/>
    <text x="530" y="300" text-anchor="middle" fill="#5eead4" font-family="Arial" font-size="18" font-weight="700">ESP32</text>
    <text x="530" y="322" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="12">DevKit</text>
    <text x="530" y="348" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="11">USB 5V</text>

    <!-- Left pins -->
    <g fill="#c0c0c0">
      <rect x="418" y="180" width="12" height="10"/><rect x="418" y="200" width="12" height="10"/>
      <rect x="418" y="220" width="12" height="10"/><rect x="418" y="240" width="12" height="10"/>
      <rect x="418" y="260" width="12" height="10"/><rect x="418" y="280" width="12" height="10"/>
      <rect x="418" y="300" width="12" height="10"/><rect x="418" y="320" width="12" height="10"/>
      <rect x="418" y="340" width="12" height="10"/><rect x="418" y="360" width="12" height="10"/>
      <rect x="418" y="380" width="12" height="10"/><rect x="418" y="400" width="12" height="10"/>
      <rect x="418" y="420" width="12" height="10"/><rect x="418" y="440" width="12" height="10"/>
    </g>
    <text x="448" y="189" class="pinw">3V3</text>
    <text x="448" y="209" class="pinw">GND</text>
    <text x="448" y="229" class="pinw">13</text>
    <text x="448" y="249" class="pinw">12</text>
    <text x="448" y="269" class="pinw">14</text>
    <text x="448" y="289" class="pinw">27</text>
    <text x="448" y="309" class="pinw">26</text>
    <text x="448" y="329" class="pinw">25</text>
    <text x="448" y="349" class="pinw">33</text>
    <text x="448" y="369" class="pinw">32</text>
    <text x="448" y="389" class="pinw">15</text>
    <text x="448" y="409" class="pinw">4</text>
    <text x="448" y="429" class="pinw">34</text>
    <text x="448" y="449" class="pinw">GND</text>

    <!-- Right pins decorative -->
    <g fill="#c0c0c0">
      <rect x="630" y="180" width="12" height="10"/><rect x="630" y="200" width="12" height="10"/>
      <rect x="630" y="220" width="12" height="10"/><rect x="630" y="240" width="12" height="10"/>
      <rect x="630" y="260" width="12" height="10"/><rect x="630" y="280" width="12" height="10"/>
      <rect x="630" y="300" width="12" height="10"/><rect x="630" y="320" width="12" height="10"/>
    </g>
  </g>

  <!-- ===== LEDs (right) ===== -->
  <g id="leds">
    <text x="820" y="120" class="label" font-weight="700">8 ◊ LED (+ 220©)</text>

    <!-- LED helpers: circle + wire target -->
    <!-- LED1 GP13 green -->
    <circle cx="780" cy="185" r="14" fill="#22c55e" stroke="#166534" stroke-width="2"/>
    <circle cx="780" cy="185" r="5" fill="#bbf7d0"/>
    <text x="804" y="190" class="label">LED1 ∑ GP13</text>
    <path d="M424 185 H760" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>

    <!-- LED2 GP12 lime -->
    <circle cx="780" cy="225" r="14" fill="#84cc16" stroke="#3f6212" stroke-width="2"/>
    <circle cx="780" cy="225" r="5" fill="#ecfccb"/>
    <text x="804" y="230" class="label">LED2 ∑ GP12</text>
    <path d="M424 205 H700 V225 H760" fill="none" stroke="#84cc16" stroke-width="3" stroke-linecap="round"/>

    <!-- LED3 GP14 yellow -->
    <circle cx="780" cy="265" r="14" fill="#eab308" stroke="#a16207" stroke-width="2"/>
    <circle cx="780" cy="265" r="5" fill="#fef08a"/>
    <text x="804" y="270" class="label">LED3 ∑ GP14</text>
    <path d="M424 225 H680 V265 H760" fill="none" stroke="#eab308" stroke-width="3" stroke-linecap="round"/>

    <!-- LED4 GP27 orange -->
    <circle cx="780" cy="305" r="14" fill="#f97316" stroke="#c2410c" stroke-width="2"/>
    <circle cx="780" cy="305" r="5" fill="#ffedd5"/>
    <text x="804" y="310" class="label">LED4 ∑ GP27</text>
    <path d="M424 245 H660 V305 H760" fill="none" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>

    <!-- LED5 GP26 cyan -->
    <circle cx="780" cy="345" r="14" fill="#06b6d4" stroke="#0e7490" stroke-width="2"/>
    <circle cx="780" cy="345" r="5" fill="#cffafe"/>
    <text x="804" y="350" class="label">LED5 ∑ GP26</text>
    <path d="M424 265 H640 V345 H760" fill="none" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"/>

    <!-- LED6 GP25 blue -->
    <circle cx="780" cy="385" r="14" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
    <circle cx="780" cy="385" r="5" fill="#dbeafe"/>
    <text x="804" y="390" class="label">LED6 ∑ GP25</text>
    <path d="M424 285 H620 V385 H760" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>

    <!-- LED7 GP33 violet -->
    <circle cx="780" cy="425" r="14" fill="#a855f7" stroke="#6b21a8" stroke-width="2"/>
    <circle cx="780" cy="425" r="5" fill="#f3e8ff"/>
    <text x="804" y="430" class="label">LED7 ∑ GP33</text>
    <path d="M424 305 H600 V425 H760" fill="none" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>

    <!-- LED8 GP32 pink -->
    <circle cx="780" cy="465" r="14" fill="#ec4899" stroke="#9d174d" stroke-width="2"/>
    <circle cx="780" cy="465" r="5" fill="#fce7f3"/>
    <text x="804" y="470" class="label">LED8 ∑ GP32</text>
    <path d="M424 325 H580 V465 H760" fill="none" stroke="#ec4899" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- ===== Left side: PIR, LDR, Buzzer ===== -->

  <!-- PIR -->
  <g id="pir">
    <rect x="60" y="160" width="140" height="100" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5"/>
    <circle cx="130" cy="200" r="28" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="130" cy="200" r="18" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
    <text x="130" y="248" text-anchor="middle" class="label" font-weight="700">PIR</text>
    <text x="130" y="150" text-anchor="middle" class="tiny">Mouvement</text>
    <!-- wire to GP15 -->
    <path d="M200 210 H320 V385 H418" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <text x="250" y="200" class="pin" fill="#3b82f6" font-weight="700">GP15</text>
  </g>

  <!-- LDR -->
  <g id="ldr">
    <rect x="60" y="300" width="140" height="90" rx="8" fill="#ffffff" stroke="#eab308" stroke-width="2.5"/>
    <!-- zigzag LDR symbol -->
    <path d="M95 345 h12 l6-12 6 24 6-24 6 24 6-12 h12" fill="none" stroke="#eab308" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="95" cy="345" r="3" fill="#eab308"/>
    <circle cx="155" cy="345" r="3" fill="#eab308"/>
    <text x="130" y="375" text-anchor="middle" class="label" font-weight="700">LDR</text>
    <text x="130" y="290" text-anchor="middle" class="tiny">Luminositť</text>
    <path d="M200 345 H300 V425 H418" fill="none" stroke="#eab308" stroke-width="3" stroke-linecap="round"/>
    <text x="250" y="335" class="pin" fill="#a16207" font-weight="700">GP34</text>
  </g>

  <!-- Buzzer -->
  <g id="buzzer">
    <rect x="60" y="430" width="140" height="90" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="2.5"/>
    <circle cx="130" cy="465" r="22" fill="#1f2937"/>
    <circle cx="130" cy="465" r="12" fill="#374151"/>
    <circle cx="130" cy="465" r="4" fill="#9ca3af"/>
    <text x="130" y="505" text-anchor="middle" class="label" font-weight="700">Buzzer</text>
    <text x="130" y="420" text-anchor="middle" class="tiny">Alarme</text>
    <path d="M200 465 H280 V405 H418" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    <text x="250" y="455" class="pin" fill="#dc2626" font-weight="700">GP4</text>
  </g>

  <!-- GND common note -->
  <path d="M424 445 H360 V520 H100" fill="none" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
  <text x="220" y="540" class="label" font-weight="700">GND (commun)</text>
  <line x1="90" y1="520" x2="110" y2="520" stroke="#111827" stroke-width="2"/>
  <line x1="95" y1="528" x2="105" y2="528" stroke="#111827" stroke-width="2"/>
  <line x1="98" y1="536" x2="102" y2="536" stroke="#111827" stroke-width="2"/>

  <!-- Legend -->
  <g id="legend">
    <rect x="700" y="520" width="360" height="80" rx="8" fill="#f3f4f6" stroke="#e5e7eb"/>
    <text x="720" y="545" class="label" font-weight="700">Lťgende</text>
    <circle cx="730" cy="568" r="6" fill="#22c55e"/><text x="744" y="572" class="tiny">LED</text>
    <circle cx="800" cy="568" r="6" fill="#3b82f6"/><text x="814" y="572" class="tiny">PIR</text>
    <circle cx="870" cy="568" r="6" fill="#eab308"/><text x="884" y="572" class="tiny">LDR</text>
    <circle cx="940" cy="568" r="6" fill="#ef4444"/><text x="954" y="572" class="tiny">Buzzer</text>
    <line x1="730" y1="590" x2="770" y2="590" stroke="#111827" stroke-width="2.5"/><text x="780" y="594" class="tiny">GND</text>
  </g>
</svg>
